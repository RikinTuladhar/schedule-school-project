services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: lekali-app
        container_name: lekali-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
        networks:
            - lekali-network
    
    webserver:
        image: nginx:alpine
        container_name: lekali-webserver
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - lekali-network

    db:
        image: mysql:8.0
        container_name: lekali-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-lekali}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
            MYSQL_PASSWORD: ${DB_PASSWORD:-root}
            MYSQL_USER: ${DB_USERNAME:-lekali}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - dbdata:/var/lib/mysql
        networks:
            - lekali-network

networks:
    lekali-network:
        driver: bridge

volumes:
    dbdata:
        driver: local
